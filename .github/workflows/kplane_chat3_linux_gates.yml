# Produces a Linux/POSIX SECTION 1 transcript at a fixed implementation anchor.
# Download artifact `chat3-linux-section1`, save as `linux_section1.txt`, then:
#   uv run python tools/assemble_unified_hostile_packet.py --anchor <same-commit> --section1-from linux_section1.txt
name: K-plane Chat3 Linux gates

on:
  workflow_dispatch:

jobs:
  linux-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 4db13f362f9404176834264fb40f1b678365bd90

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - - name: Sync and run canonical gate script
        run: |
          git rev-parse HEAD
          uv sync --extra dev
          bash scripts/chat3_linux_gates.sh > chat3_linux_section1.txt 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chat3-linux-section1
          path: chat3_linux_section1.txt